<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>房间容器掉落系统（静态版）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📦 房间容器掉落系统（静态版）</h1>
      <p>双击html即可运行，不再需要每次启动 Node</p>
    </header>

    <section class="panel">
      <div class="info-grid">
        <div class="card">
          <span class="label">容器有效规则数</span>
          <strong id="vesselRuleCount">0</strong>
        </div>
        <div class="card">
          <span class="label">品质有效规则数</span>
          <strong id="colorRuleCount">0</strong>
        </div>
        <div class="card">
          <span class="label">物品有效规则数</span>
          <strong id="itemRuleCount">0</strong>
        </div>
        <div class="card">
          <span class="label">地图房间总数</span>
          <strong id="roomCount">0</strong>
        </div>
        <div class="card">
          <span class="label">最近刷新时间</span>
          <strong id="lastLoadedAt">-</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>按容器搜索</h2>
      <div class="control-grid">
        <div class="field">
          <label for="containerSelect">请选择容器</label>
          <select id="containerSelect"></select>
        </div>
        <div class="field">
          <label for="searchTimes">请输入容器搜索次数</label>
          <input id="searchTimes" type="number" min="1" value="1" />
        </div>
        <div class="field">
          <label for="globalLimit">物品总掉落最大上限</label>
          <input id="globalLimit" type="number" min="1" value="999999" />
        </div>
      </div>
      <div class="btn-row">
        <button id="simulateBtn" class="btn primary">开始模拟</button>
      </div>
    </section>

    <section class="panel">
      <h2>按房间搜索</h2>
      <div class="control-grid">
        <div class="field">
          <label for="roomSelect">请选择房间</label>
          <select id="roomSelect"></select>
        </div>
        <div class="field">
          <label for="roomSearchTimes">请输入搜索房间次数</label>
          <input id="roomSearchTimes" type="number" min="1" value="1" />
        </div>
        <div class="field">
          <label for="roomGlobalLimit">物品总掉落最大上限</label>
          <input id="roomGlobalLimit" type="number" min="1" value="999999" />
        </div>
      </div>
      <div class="btn-row">
        <button id="simulateRoomBtn" class="btn primary">开始搜索房间</button>
      </div>
    </section>

    <section class="panel">
      <h2>状态</h2>
      <div id="statusBox" class="status-box">正在读取数据...</div>
    </section>

    <section class="panel">
      <h2>每次搜索结果</h2>
      <div id="roundList" class="round-list empty">暂无结果</div>
    </section>

    <section class="panel">
      <h2>本次汇总</h2>
      <div id="summaryBox" class="summary-box empty">暂无统计</div>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
